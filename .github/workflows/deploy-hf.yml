name: Deploy to Hugging Face

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build
        run: |
          go mod download
          mkdir -p static
          printf '\xFF\xD8\xFF\xE0\x00\x10JFIF\x00\x01\x01\x00\x00\x01\x00\x01\x00\x00' > static/background.jpg
          go build -o KrillinAI ./cmd/server

      - name: Deploy to existing HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface-hub
          hf auth login --token $HF_TOKEN

          # تحديد اسم المساحة الموجودة
          SPACE_REPO="new-eissa/my-n8n-automation1"

          echo "📤 Updating existing space: $SPACE_REPO"

          # رفع الملفات إلى المساحة الموجودة (بدون محاولة الإنشاء)
          # استخدم --force للتغلب على أي تعارضات
          hf upload $SPACE_REPO . . --repo-type space --force --token $HF_TOKEN

          echo "✅ Update completed successfully!"
          echo "🌐 https://huggingface.co/spaces/$SPACE_REPO"
